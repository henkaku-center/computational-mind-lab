blurb: Grisha collaborates with the lab on AI in education and on art–science projects, bringing his work in probabilistic computing and GPU-accelerated tools to bear on how people learn and create. Across a decade spanning biomedical research, AI, and software, a running theme has been active learning and tight feedback loops between hypothesis and evidence, alongside a passion for building visually stunning tools.
