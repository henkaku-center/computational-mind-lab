blurbJa: Grishaは、当研究室とAI教育やアート・サイエンスのプロジェクトで共同研究を行っており、確率的計算やGPUによる高速計算に関する知見を、人々がどのように学び、創造するかという問いに活かしている。生物医学研究、AI、ソフトウェアにわたる10年以上の経験を通じて一貫したテーマは、能動学習と、仮説と証拠のあいだの緊密なフィードバックループであり、加えて視覚的に美しいツールを構築することへの情熱がある。
