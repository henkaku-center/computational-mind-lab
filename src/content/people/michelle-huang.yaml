blurb: >-
  Michelle is an artist-researcher designing architectures of care. She
  founded Akiya Collective, a 501(c)(3) nonprofit social R&D lab that
  revitalizes abandoned houses (akiya) in rural Japan into installations,
  residencies, and research sites, and is a Visiting Researcher at Chiba
  Institute of Technology, where she is co-PI on a nationwide participatory
  study of cooperation through social objects. She and the lab are
  collaborating on Kaeru-chan, a nationwide field study tracing how objects
  can recruit strangers into chains of cooperation. Her work has been
  supported by Emergent Ventures, O'Shaughnessy Ventures, and the US-Japan
  Foundation, and featured by NPR, BBC, Business Insider, ABC, CNET, and The
  Independent.
