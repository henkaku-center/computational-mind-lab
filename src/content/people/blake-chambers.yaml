blurbJa: Blakeは、University of Wisconsin-MadisonでBachelor of Science in Neurobiology and Psychologyを取得し、卒業したばかりです。学部生時代の研究では、Diane Gooding博士のPATHS Labにおいて、統合失調症の発症リスクが高い集団におけるバイオビヘイビアラル（生物行動学的）指標に焦点を当てました。Blakeは、意味的な欠損がアルツハイマー病および軽度認知障害（MCI）の識別にどのように活用できるかに関心を持っています。
