blurbJa: 私は認知科学の博士課程の学生であり、これまで心理学を専門としてきたが、近年は計算論的モデリングに強い関心を持つようになった。関心の中心は、帰納的推論・因果推論・演繹的推論など様々な推論について提案されている計算モデルを統合すること、そうした新たなモデル（特に因果推論に重点を置いたもの）を提案すること、そして人間の推論の質的・量的側面を、それぞれの提案がどれだけ的確に捉えているかという観点から比較することである。
