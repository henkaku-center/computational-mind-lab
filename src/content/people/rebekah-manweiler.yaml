blurbJa: Rebekahは、ローレンスにあるUniversity of Kansasの学部4年生で、コンピュータサイエンスを専攻し、言語学と数学を副専攻としている。彼女は計算論的モデリングと機械学習、そしてそれらの心理言語学への応用に関心を持っている。心理言語学の中でも、心内辞書の構造とアクセス方法に特に興味を抱いている。夏期にはNicole Beckageの指導のもと、認知モデリングとその応用に関する研究に取り組んでいる。
