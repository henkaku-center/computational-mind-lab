blurbJa: 計算論的認知心理学者として、私の研究プログラムでは知覚と高次認知の交差点に位置する問題を探求している。統計学と計算機科学における近年の進歩を用いて理想学習者モデルを構築し、それらのモデルがこれらの問題をどのように解決するかを検討したうえで、伝統的な行動実験によってモデルの予測を検証する。理想学習者モデルが人間の行動をうまく再現するためには、人々が問題解決に用いる知識を明示化する必要がある。そのため、このモデルはそうした知識を理解する助けとなる。このアプローチは新たな機械学習の手法を生み出すとともに、新しい心理学的原理の発見にもつながる。
